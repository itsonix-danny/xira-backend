spring:
  application:
    name: xira
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/xira
    username: xira
    password: xira
  jpa:
    hibernate:
      ddl-auto: create
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
    open-in-view: true
logging:
  level:
    root: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} | xira | %logger{30} | %-5level | %msg%n%throwable"
server:
  port: 8040
management:
  endpoints:
    web:
      base-path: ""
      exposure:
        include: info,health,prometheus,loggers
  endpoint:
    health:
      probes:
        enabled: true
      show-components: always
      show-details: always
      access: unrestricted
  metrics:
    tags:
      application: ${spring.application.name}
      environment: ${spring.profiles.active}
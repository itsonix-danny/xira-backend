openapi: 3.0.3
info:
  title: Xira
  version: 1.0.0
  description: 'Xira - Issue tracking and project management'

tags:
  - name: Auth
    description: Authentication endpoints
  - name: Users
    description: User management endpoints
  - name: Projects
    description: Project management endpoints
  - name: Boards
    description: Board management endpoints
  - name: Sprints
    description: Sprint management endpoints
  - name: Issues
    description: Issue management endpoints

paths:
  /users:
    get:
      tags: [ Users ]
      operationId: getUsers
      summary: Search for users
      description: 'Search for users by optional email filter and/or exclude users already assigned to a specific project. Returns a list of matching users.'
      security:
        - BearerAuth: [ ]
      parameters:
        - name: email
          in: query
          required: false
          description: Optional email address for exact match (case-insensitive)
          schema:
            type: string
            format: email
        - name: projectKey
          in: query
          required: false
          description: Optional project key to exclude users that are already members of this project
          schema:
            type: string
      responses:
        '200':
          description: List of users matching the search criteria (empty array if no matches)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserResponse'
        '400':
          $ref: '#/components/responses/Problem'
        '401':
          $ref: '#/components/responses/Problem'
        '500':
          $ref: '#/components/responses/Problem'

  /auth/register:
    post:
      tags: [ Auth ]
      operationId: register
      summary: Register a new user account
      description: 'Creates a new user account with the provided credentials. Does not automatically log in the user.'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: User account created successfully
        '400':
          $ref: '#/components/responses/Problem'
        '409':
          $ref: '#/components/responses/Problem'
        '500':
          $ref: '#/components/responses/Problem'

  /auth/login:
    post:
      tags: [ Auth ]
      operationId: login
      summary: Login with username and password
      description: 'Authenticates the user and returns a signed JWT. Use the token in the `Authorization: Bearer <token>` header when calling protected endpoints.'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: JWT issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '400':
          $ref: '#/components/responses/Problem'
        '401':
          $ref: '#/components/responses/Problem'
        '500':
          $ref: '#/components/responses/Problem'

  /projects:
    get:
      tags: [ Projects ]
      operationId: getProjects
      summary: Get projects of the authenticated user
      description: Returns all projects the authenticated user is a member of.
      security:
        - BearerAuth: [ ]
      responses:
        '200':
          description: Projects retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProjectDetailsResponse'
        '401':
          $ref: '#/components/responses/Problem'
        '500':
          $ref: '#/components/responses/Problem'
    post:
      tags: [ Projects ]
      operationId: createProject
      summary: Create a new project
      description: 'Creates a new project owned by the authenticated user.'
      security:
        - BearerAuth: [ ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProjectRequest'
      responses:
        '201':
          description: Project created successfully
          headers:
            Location:
              description: URL of the created project resource
              schema:
                type: string
                format: uri
        '400':
          $ref: '#/components/responses/Problem'
        '401':
          $ref: '#/components/responses/Problem'
        '409':
          $ref: '#/components/responses/Problem'
        '500':
          $ref: '#/components/responses/Problem'

  /projects/{key}:
    get:
      tags: [ Projects ]
      operationId: getProjectByKey
      summary: Get project details
      description: 'Returns detailed information about a project including its boards.'
      security:
        - BearerAuth: [ ]
      parameters:
        - name: key
          in: path
          required: true
          description: Project key
          schema:
            type: string
      responses:
        '200':
          description: Project retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectDetailsResponse'
        '401':
          $ref: '#/components/responses/Problem'
        '403':
          $ref: '#/components/responses/Problem'
        '404':
          $ref: '#/components/responses/Problem'
        '500':
          $ref: '#/components/responses/Problem'
    patch:
      tags: [ Projects ]
      operationId: updateProject
      summary: Update a project
      description: 'Updates project name and/or description. Only accessible by project admins.'
      security:
        - BearerAuth: [ ]
      parameters:
        - name: key
          in: path
          required: true
          description: Project key
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProjectRequest'
      responses:
        '200':
          description: Project updated successfully
        '400':
          $ref: '#/components/responses/Problem'
        '401':
          $ref: '#/components/responses/Problem'
        '403':
          $ref: '#/components/responses/Problem'
        '404':
          $ref: '#/components/responses/Problem'
        '409':
          $ref: '#/components/responses/Problem'
        '500':
          $ref: '#/components/responses/Problem'

  /projects/{key}/boards:
    post:
      tags: [ Boards ]
      operationId: createBoard
      summary: Add a board to a project
      description: 'Creates a new board for the specified project. Only accessible by project admins.'
      security:
        - BearerAuth: [ ]
      parameters:
        - name: key
          in: path
          required: true
          description: Project key
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddBoardRequest'
      responses:
        '201':
          description: Board created successfully
          headers:
            Location:
              description: URL of the created board resource
              schema:
                type: string
                format: uri
        '400':
          $ref: '#/components/responses/Problem'
        '401':
          $ref: '#/components/responses/Problem'
        '403':
          $ref: '#/components/responses/Problem'
        '404':
          $ref: '#/components/responses/Problem'
        '409':
          $ref: '#/components/responses/Problem'
        '500':
          $ref: '#/components/responses/Problem'

  /projects/{key}/sprints:
    post:
      tags: [ Sprints ]
      operationId: createSprint
      summary: Add a sprint to a project
      description: 'Creates a new sprint for the specified project. Only project members can manage sprints.'
      security:
        - BearerAuth: [ ]
      parameters:
        - name: key
          in: path
          required: true
          description: Project key
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddSprintRequest'
      responses:
        '201':
          description: Sprint created successfully
          headers:
            Location:
              description: URL of the created sprint resource
              schema:
                type: string
                format: uri
        '400':
          $ref: '#/components/responses/Problem'
        '401':
          $ref: '#/components/responses/Problem'
        '403':
          $ref: '#/components/responses/Problem'
        '404':
          $ref: '#/components/responses/Problem'
        '409':
          $ref: '#/components/responses/Problem'
        '500':
          $ref: '#/components/responses/Problem'

  /projects/{key}/sprints/{sprintId}:
    patch:
      tags: [ Sprints ]
      operationId: updateSprint
      summary: Update a sprint
      description: 'Updates sprint name and/or goal. Finished sprints cannot be updated.'
      security:
        - BearerAuth: [ ]
      parameters:
        - name: key
          in: path
          required: true
          description: Project key
          schema:
            type: string
        - name: sprintId
          in: path
          required: true
          description: Sprint identifier
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateSprintRequest'
      responses:
        '200':
          description: Sprint updated successfully
        '400':
          $ref: '#/components/responses/Problem'
        '401':
          $ref: '#/components/responses/Problem'
        '403':
          $ref: '#/components/responses/Problem'
        '404':
          $ref: '#/components/responses/Problem'
        '409':
          $ref: '#/components/responses/Problem'
        '500':
          $ref: '#/components/responses/Problem'
    delete:
      tags: [ Sprints ]
      operationId: deleteSprint
      summary: Delete a sprint
      description: 'Deletes a sprint that is not active or finished. Issues in the sprint are moved back to the backlog.'
      security:
        - BearerAuth: [ ]
      parameters:
        - name: key
          in: path
          required: true
          description: Project key
          schema:
            type: string
        - name: sprintId
          in: path
          required: true
          description: Sprint identifier
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Sprint deleted successfully
        '400':
          $ref: '#/components/responses/Problem'
        '401':
          $ref: '#/components/responses/Problem'
        '403':
          $ref: '#/components/responses/Problem'
        '404':
          $ref: '#/components/responses/Problem'
        '409':
          $ref: '#/components/responses/Problem'
        '500':
          $ref: '#/components/responses/Problem'

  /projects/{key}/sprints/{sprintId}/start:
    post:
      tags: [ Sprints ]
      operationId: startSprint
      summary: Start a sprint
      description: 'Starts a planned sprint and marks it as active. Only one active sprint per project is allowed.'
      security:
        - BearerAuth: [ ]
      parameters:
        - name: key
          in: path
          required: true
          description: Project key
          schema:
            type: string
        - name: sprintId
          in: path
          required: true
          description: Sprint identifier
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Sprint started successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SprintResponse'
        '400':
          $ref: '#/components/responses/Problem'
        '401':
          $ref: '#/components/responses/Problem'
        '403':
          $ref: '#/components/responses/Problem'
        '404':
          $ref: '#/components/responses/Problem'
        '409':
          $ref: '#/components/responses/Problem'
        '500':
          $ref: '#/components/responses/Problem'

  /projects/{key}/sprints/{sprintId}/finish:
    post:
      tags: [ Sprints ]
      operationId: finishSprint
      summary: Finish a sprint
      description: 'Finishes an active sprint. Unfinished issues are returned to the backlog while completed issues remain assigned.'
      security:
        - BearerAuth: [ ]
      parameters:
        - name: key
          in: path
          required: true
          description: Project key
          schema:
            type: string
        - name: sprintId
          in: path
          required: true
          description: Sprint identifier
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Sprint finished successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SprintResponse'
        '400':
          $ref: '#/components/responses/Problem'
        '401':
          $ref: '#/components/responses/Problem'
        '403':
          $ref: '#/components/responses/Problem'
        '404':
          $ref: '#/components/responses/Problem'
        '409':
          $ref: '#/components/responses/Problem'
        '500':
          $ref: '#/components/responses/Problem'

  /projects/{key}/boards/{boardNumber}:
    get:
      tags: [ Boards ]
      operationId: getBoardDetails
      summary: Get board details
      description: 'Returns detailed board information with type-specific content (SCRUM: sprints and backlog, KANBAN: columns with issues). Only accessible by project members.'
      security:
        - BearerAuth: [ ]
      parameters:
        - name: key
          in: path
          required: true
          description: Project key
          schema:
            type: string
        - name: boardNumber
          in: path
          required: true
          description: Board number
          schema:
            type: integer
      responses:
        '200':
          description: Board details retrieved successfully
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ScrumBoardDetailsResponse'
                  - $ref: '#/components/schemas/KanbanBoardDetailsResponse'
        '401':
          $ref: '#/components/responses/Problem'
        '403':
          $ref: '#/components/responses/Problem'
        '404':
          $ref: '#/components/responses/Problem'
        '500':
          $ref: '#/components/responses/Problem'
    patch:
      tags: [ Boards ]
      operationId: updateBoard
      summary: Update a board
      description: 'Updates board name. Only accessible by project admins.'
      security:
        - BearerAuth: [ ]
      parameters:
        - name: key
          in: path
          required: true
          description: Project key
          schema:
            type: string
        - name: boardNumber
          in: path
          required: true
          description: Board number
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateBoardRequest'
      responses:
        '200':
          description: Board updated successfully
        '400':
          $ref: '#/components/responses/Problem'
        '401':
          $ref: '#/components/responses/Problem'
        '403':
          $ref: '#/components/responses/Problem'
        '404':
          $ref: '#/components/responses/Problem'
        '500':
          $ref: '#/components/responses/Problem'

  /projects/{key}/boards/{boardNumber}/active-sprint:
    get:
      tags: [ Boards ]
      operationId: getActiveSprint
      summary: Get active sprint view for a SCRUM board
      description: 'Returns the active sprint with board columns and issues. Only works for SCRUM boards. Returns 204 if no active sprint exists.'
      security:
        - BearerAuth: [ ]
      parameters:
        - name: key
          in: path
          required: true
          description: Project key
          schema:
            type: string
        - name: boardNumber
          in: path
          required: true
          description: Board number
          schema:
            type: integer
      responses:
        '200':
          description: Active sprint retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActiveSprintResponse'
        '204':
          description: No active sprint exists
        '400':
          $ref: '#/components/responses/Problem'
        '401':
          $ref: '#/components/responses/Problem'
        '403':
          $ref: '#/components/responses/Problem'
        '404':
          $ref: '#/components/responses/Problem'
        '500':
          $ref: '#/components/responses/Problem'

  /projects/{key}/members:
    get:
      tags: [ Projects ]
      operationId: getProjectMembers
      summary: Get all members of a project
      description: 'Returns all members of the specified project with their roles and ownership status. Only accessible by project members.'
      security:
        - BearerAuth: [ ]
      parameters:
        - name: key
          in: path
          required: true
          description: Project key
          schema:
            type: string
      responses:
        '200':
          description: Project members retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProjectMemberResponse'
        '401':
          $ref: '#/components/responses/Problem'
        '403':
          $ref: '#/components/responses/Problem'
        '404':
          $ref: '#/components/responses/Problem'
        '500':
          $ref: '#/components/responses/Problem'
    post:
      tags: [ Projects ]
      operationId: addProjectMember
      summary: Add a member to a project
      description: 'Adds a new member to the project. Only accessible by project admins.'
      security:
        - BearerAuth: [ ]
      parameters:
        - name: key
          in: path
          required: true
          description: Project key
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddProjectMemberRequest'
      responses:
        '201':
          description: Project member added successfully
        '400':
          $ref: '#/components/responses/Problem'
        '401':
          $ref: '#/components/responses/Problem'
        '403':
          $ref: '#/components/responses/Problem'
        '404':
          $ref: '#/components/responses/Problem'
        '409':
          $ref: '#/components/responses/Problem'
        '500':
          $ref: '#/components/responses/Problem'

  /issues:
    get:
      tags: [ Issues ]
      operationId: getIssues
      summary: Get issues with optional filters
      description: 'Returns issues from projects the authenticated user is a member of. By default, returns all unfinished issues. Supports filtering by project, assignee, status, and search term.'
      security:
        - BearerAuth: [ ]
      parameters:
        - name: projectKey
          in: query
          required: false
          description: Optional project key to filter issues by project
          schema:
            type: string
        - name: assigneeId
          in: query
          required: false
          description: Optional user ID to filter issues by assignee
          schema:
            type: string
            format: uuid
        - name: includeFinished
          in: query
          required: false
          description: Include finished issues (default is false)
          schema:
            type: boolean
            default: false
        - name: search
          in: query
          required: false
          description: Search term to filter by issue key or title (case-insensitive)
          schema:
            type: string
      responses:
        '200':
          description: Issues retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/IssueSummaryResponse'
        '401':
          $ref: '#/components/responses/Problem'
        '500':
          $ref: '#/components/responses/Problem'

  /projects/{key}/issues:
    post:
      tags: [ Issues ]
      operationId: createIssue
      summary: Create a new issue for a project
      description: 'Creates a new issue for the specified project. The authenticated user becomes the reporter. The default workflow status with the minimum order is assigned.'
      security:
        - BearerAuth: [ ]
      parameters:
        - name: key
          in: path
          required: true
          description: Project key
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateIssueRequest'
      responses:
        '201':
          description: Issue created successfully
          headers:
            Location:
              description: URL of the created issue resource
              schema:
                type: string
                format: uri
        '400':
          $ref: '#/components/responses/Problem'
        '401':
          $ref: '#/components/responses/Problem'
        '403':
          $ref: '#/components/responses/Problem'
        '404':
          $ref: '#/components/responses/Problem'
        '500':
          $ref: '#/components/responses/Problem'

  /projects/{key}/issues/{issueKey}:
    get:
      tags: [ Issues ]
      operationId: getIssueByKey
      summary: Get issue details
      description: 'Returns detailed information about a specific issue.'
      security:
        - BearerAuth: [ ]
      parameters:
        - name: key
          in: path
          required: true
          description: Project key
          schema:
            type: string
        - name: issueKey
          in: path
          required: true
          description: Issue key (e.g., XIRA-1)
          schema:
            type: string
      responses:
        '200':
          description: Issue details retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IssueDetailsResponse'
        '401':
          $ref: '#/components/responses/Problem'
        '403':
          $ref: '#/components/responses/Problem'
        '404':
          $ref: '#/components/responses/Problem'
        '500':
          $ref: '#/components/responses/Problem'
    patch:
      tags: [ Issues ]
      operationId: updateIssue
      summary: Update an existing issue
      description: 'Updates title, description, issue type, and/or priority of an existing issue.'
      security:
        - BearerAuth: [ ]
      parameters:
        - name: key
          in: path
          required: true
          description: Project key
          schema:
            type: string
        - name: issueKey
          in: path
          required: true
          description: Issue key (e.g., XIRA-1)
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateIssueRequest'
      responses:
        '200':
          description: Issue updated successfully
        '400':
          $ref: '#/components/responses/Problem'
        '401':
          $ref: '#/components/responses/Problem'
        '403':
          $ref: '#/components/responses/Problem'
        '404':
          $ref: '#/components/responses/Problem'
        '500':
          $ref: '#/components/responses/Problem'

  /projects/{key}/issues/{issueKey}/assignees:
    post:
      tags: [ Issues ]
      operationId: addAssignee
      summary: Add an assignee to an issue
      description: 'Adds a user as an assignee to the specified issue.'
      security:
        - BearerAuth: [ ]
      parameters:
        - name: key
          in: path
          required: true
          description: Project key
          schema:
            type: string
        - name: issueKey
          in: path
          required: true
          description: Issue key
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddAssigneeRequest'
      responses:
        '201':
          description: Assignee added successfully
        '400':
          $ref: '#/components/responses/Problem'
        '401':
          $ref: '#/components/responses/Problem'
        '403':
          $ref: '#/components/responses/Problem'
        '404':
          $ref: '#/components/responses/Problem'
        '409':
          $ref: '#/components/responses/Problem'
        '500':
          $ref: '#/components/responses/Problem'

  /projects/{key}/issues/{issueKey}/assignees/{userId}:
    delete:
      tags: [ Issues ]
      operationId: removeAssignee
      summary: Remove an assignee from an issue
      description: 'Removes a user as an assignee from the specified issue.'
      security:
        - BearerAuth: [ ]
      parameters:
        - name: key
          in: path
          required: true
          description: Project key
          schema:
            type: string
        - name: issueKey
          in: path
          required: true
          description: Issue key
          schema:
            type: string
        - name: userId
          in: path
          required: true
          description: User ID
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Assignee removed successfully
        '401':
          $ref: '#/components/responses/Problem'
        '403':
          $ref: '#/components/responses/Problem'
        '404':
          $ref: '#/components/responses/Problem'
        '500':
          $ref: '#/components/responses/Problem'

  /projects/{key}/issues/{issueKey}/status:
    patch:
      tags: [ Issues ]
      operationId: setIssueStatus
      summary: Set workflow status of an issue
      description: 'Sets the workflow status of an issue. If the new status has category DONE, sets closedAt to current time, otherwise sets it to null.'
      security:
        - BearerAuth: [ ]
      parameters:
        - name: key
          in: path
          required: true
          description: Project key
          schema:
            type: string
        - name: issueKey
          in: path
          required: true
          description: Issue key
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetIssueStatusRequest'
      responses:
        '200':
          description: Issue status updated successfully
        '400':
          $ref: '#/components/responses/Problem'
        '401':
          $ref: '#/components/responses/Problem'
        '403':
          $ref: '#/components/responses/Problem'
        '404':
          $ref: '#/components/responses/Problem'
        '500':
          $ref: '#/components/responses/Problem'

  /projects/{key}/issues/{issueKey}/comments:
    post:
      tags: [ Issues ]
      operationId: addComment
      summary: Add a comment to an issue
      description: 'Adds a new comment to the specified issue.'
      security:
        - BearerAuth: [ ]
      parameters:
        - name: key
          in: path
          required: true
          description: Project key
          schema:
            type: string
        - name: issueKey
          in: path
          required: true
          description: Issue key
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddCommentRequest'
      responses:
        '201':
          description: Comment added successfully
        '400':
          $ref: '#/components/responses/Problem'
        '401':
          $ref: '#/components/responses/Problem'
        '403':
          $ref: '#/components/responses/Problem'
        '404':
          $ref: '#/components/responses/Problem'
        '500':
          $ref: '#/components/responses/Problem'

  /projects/{key}/issues/{issueKey}/comments/{commentId}:
    patch:
      tags: [ Issues ]
      operationId: updateComment
      summary: Update a comment
      description: 'Updates an existing comment. Only the comment author can update it.'
      security:
        - BearerAuth: [ ]
      parameters:
        - name: key
          in: path
          required: true
          description: Project key
          schema:
            type: string
        - name: issueKey
          in: path
          required: true
          description: Issue key
          schema:
            type: string
        - name: commentId
          in: path
          required: true
          description: Comment ID
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCommentRequest'
      responses:
        '200':
          description: Comment updated successfully
        '400':
          $ref: '#/components/responses/Problem'
        '401':
          $ref: '#/components/responses/Problem'
        '403':
          $ref: '#/components/responses/Problem'
        '404':
          $ref: '#/components/responses/Problem'
        '500':
          $ref: '#/components/responses/Problem'
    delete:
      tags: [ Issues ]
      operationId: deleteComment
      summary: Delete a comment
      description: 'Deletes a comment. Can be done by the comment author or project admins.'
      security:
        - BearerAuth: [ ]
      parameters:
        - name: key
          in: path
          required: true
          description: Project key
          schema:
            type: string
        - name: issueKey
          in: path
          required: true
          description: Issue key
          schema:
            type: string
        - name: commentId
          in: path
          required: true
          description: Comment ID
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Comment deleted successfully
        '401':
          $ref: '#/components/responses/Problem'
        '403':
          $ref: '#/components/responses/Problem'
        '404':
          $ref: '#/components/responses/Problem'
        '500':
          $ref: '#/components/responses/Problem'

  /projects/{key}/workflows/statuses:
    get:
      tags: [ Projects ]
      operationId: getWorkflowStatuses
      summary: Get all workflow statuses of a project
      description: 'Returns all workflow statuses for the specified project, sorted by status order.'
      security:
        - BearerAuth: [ ]
      parameters:
        - name: key
          in: path
          required: true
          description: Project key
          schema:
            type: string
      responses:
        '200':
          description: Workflow statuses retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/WorkflowStatusResponse'
        '401':
          $ref: '#/components/responses/Problem'
        '403':
          $ref: '#/components/responses/Problem'
        '404':
          $ref: '#/components/responses/Problem'
        '500':
          $ref: '#/components/responses/Problem'

  /projects/{key}/members/{userId}:
    patch:
      tags: [ Projects ]
      operationId: updateProjectMemberRole
      summary: Update the role of a project member
      description: 'Updates the role of an existing project member. Only accessible by project admins.'
      security:
        - BearerAuth: [ ]
      parameters:
        - name: key
          in: path
          required: true
          description: Project key
          schema:
            type: string
        - name: userId
          in: path
          required: true
          description: User ID of the project member
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProjectMemberRoleRequest'
      responses:
        '200':
          description: Project member role updated successfully
        '400':
          $ref: '#/components/responses/Problem'
        '401':
          $ref: '#/components/responses/Problem'
        '403':
          $ref: '#/components/responses/Problem'
        '404':
          $ref: '#/components/responses/Problem'
        '409':
          $ref: '#/components/responses/Problem'
        '500':
          $ref: '#/components/responses/Problem'
    delete:
      tags: [ Projects ]
      operationId: removeProjectMember
      summary: Remove a member from a project
      description: 'Removes an existing member from the project. Only accessible by project admins.'
      security:
        - BearerAuth: [ ]
      parameters:
        - name: key
          in: path
          required: true
          description: Project key
          schema:
            type: string
        - name: userId
          in: path
          required: true
          description: User ID of the project member
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Project member removed successfully
        '400':
          $ref: '#/components/responses/Problem'
        '401':
          $ref: '#/components/responses/Problem'
        '403':
          $ref: '#/components/responses/Problem'
        '404':
          $ref: '#/components/responses/Problem'
        '500':
          $ref: '#/components/responses/Problem'

components:
  responses:
    Problem:
      description: Default response in case of an error.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    ProjectBoardResponse:
      type: object
      additionalProperties: false
      required: [ name, boardNumber, type ]
      properties:
        name:
          type: string
          description: Board name
        boardNumber:
          type: integer
          format: int32
          description: Unique board number within the project
        type:
          type: string
          description: Board type
          enum: [ SCRUM, KANBAN ]

    IssueSummaryResponse:
      type: object
      additionalProperties: false
      required: [ key, title, issueType, statusCategory, priority, assignees ]
      properties:
        key:
          type: string
          description: Unique issue key (e.g., XIRA-1)
        title:
          type: string
          description: Issue title
        issueType:
          type: string
          description: Type of issue
          enum: [ BUG, TASK, STORY ]
        statusCategory:
          type: string
          description: Workflow status category
          enum: [ TODO, IN_PROGRESS, DONE ]
        priority:
          type: string
          description: Issue priority
          enum: [ LOW, MEDIUM, HIGH, CRITICAL ]
        assignees:
          type: array
          description: List of users assigned to this issue
          items:
            $ref: '#/components/schemas/UserResponse'

    SprintWithIssuesResponse:
      type: object
      additionalProperties: false
      required: [ id, name, goal, state, createdAt, issues ]
      properties:
        id:
          type: string
          format: uuid
          description: Sprint identifier
        name:
          type: string
          description: Sprint name
        goal:
          type: string
          description: Sprint goal
        state:
          $ref: '#/components/schemas/SprintState'
        createdAt:
          type: string
          format: date-time
          description: Timestamp when the sprint was created
        startedAt:
          type: string
          format: date-time
          nullable: true
          description: Timestamp when the sprint was started
        finishedAt:
          type: string
          format: date-time
          nullable: true
          description: Timestamp when the sprint was finished
        issues:
          type: array
          description: List of issues in this sprint
          items:
            $ref: '#/components/schemas/IssueSummaryResponse'

    BoardColumnResponse:
      type: object
      additionalProperties: false
      required: [ name, issues ]
      properties:
        name:
          type: string
          description: Column name
        issues:
          type: array
          description: List of issues in this column
          items:
            $ref: '#/components/schemas/IssueSummaryResponse'

    ScrumBoardDetailsResponse:
      type: object
      additionalProperties: false
      required: [ name, type, backlog ]
      properties:
        name:
          type: string
          description: Board name
        type:
          type: string
          description: Board type
          enum: [ SCRUM ]
        activeSprint:
          nullable: true
          description: Currently active sprint with its issues
          allOf:
            - $ref: '#/components/schemas/SprintWithIssuesResponse'
        plannedSprints:
          type: array
          description: Planned sprints ordered by creation date (oldest first)
          items:
            $ref: '#/components/schemas/SprintWithIssuesResponse'
        backlog:
          type: array
          description: Backlog issues not assigned to any sprint and not finished, ordered by sequence number
          items:
            $ref: '#/components/schemas/IssueSummaryResponse'

    KanbanBoardDetailsResponse:
      type: object
      additionalProperties: false
      required: [ name, type, columns ]
      properties:
        name:
          type: string
          description: Board name
        type:
          type: string
          description: Board type
          enum: [ KANBAN ]
        columns:
          type: array
          description: Board columns ordered by column order
          items:
            $ref: '#/components/schemas/BoardColumnResponse'

    ActiveSprintResponse:
      type: object
      additionalProperties: false
      required: [ id, name, goal, state, createdAt, columns ]
      properties:
        id:
          type: string
          format: uuid
          description: Sprint identifier
        name:
          type: string
          description: Sprint name
        goal:
          type: string
          description: Sprint goal
        state:
          $ref: '#/components/schemas/SprintState'
        createdAt:
          type: string
          format: date-time
          description: Timestamp when the sprint was created
        startedAt:
          type: string
          format: date-time
          nullable: true
          description: Timestamp when the sprint was started
        finishedAt:
          type: string
          format: date-time
          nullable: true
          description: Timestamp when the sprint was finished
        columns:
          type: array
          description: Board columns with issues from active sprint
          items:
            $ref: '#/components/schemas/BoardColumnResponse'

    ProjectDetailsResponse:
      type: object
      additionalProperties: false
      required: [ key, name, isOwner, isAdmin, boards ]
      properties:
        key:
          type: string
          description: Project key
        name:
          type: string
          description: Project name
        description:
          type: string
          description: Project description
          nullable: true
        isOwner:
          type: boolean
          description: Whether the authenticated user is the owner of the project
        isAdmin:
          type: boolean
          description: Whether the authenticated user is an admin of the project
        boards:
          type: array
          items:
            $ref: '#/components/schemas/ProjectBoardResponse'

    Problem:
      type: object
      additionalProperties: true
      properties:
        type:
          type: string
          format: uri
        title:
          type: string
        status:
          type: integer
          format: int32
        detail:
          type: string
        instance:
          type: string
          format: uri

    RegisterRequest:
      type: object
      additionalProperties: false
      required: [ email, password, firstName, lastName ]
      properties:
        email:
          type: string
          format: email
          description: User email address (must be unique)
        password:
          type: string
          format: password
          minLength: 8
          description: User password (minimum 8 characters)
        firstName:
          type: string
          minLength: 1
          description: User first name
        lastName:
          type: string
          minLength: 1
          description: User last name

    LoginRequest:
      type: object
      additionalProperties: false
      required: [ email, password ]
      properties:
        email:
          type: string
          description: email address
        password:
          type: string
          format: password

    TokenResponse:
      type: object
      additionalProperties: false
      required: [ access_token ]
      properties:
        access_token:
          type: string
          description: 'Signed JWT to send as `Authorization: Bearer <token>`'

    AddProjectMemberRequest:
      type: object
      additionalProperties: false
      required: [ userId, role ]
      properties:
        userId:
          type: string
          format: uuid
          description: User ID of the user to add as project member
        role:
          $ref: '#/components/schemas/ProjectMemberRole'

    ProjectMemberRole:
      type: string
      description: Role of a user within a project
      enum: [ ADMIN, DEVELOPER ]

    CreateProjectRequest:
      type: object
      additionalProperties: false
      required: [ key, name ]
      properties:
        key:
          type: string
          description: Unique project key (e.g. XIRA)
          minLength: 2
          maxLength: 10
          pattern: '[A-Z]*$'
        name:
          type: string
          description: Human-readable project name
          minLength: 1
          maxLength: 100
        description:
          type: string
          description: Optional project description
          maxLength: 200

    UpdateProjectRequest:
      type: object
      additionalProperties: false
      properties:
        name:
          type: string
          description: Human-readable project name
          minLength: 1
          maxLength: 100
        description:
          type: string
          description: Project description
          minLength: 1
          maxLength: 200

    AddBoardRequest:
      type: object
      additionalProperties: false
      required: [ name, type ]
      properties:
        name:
          type: string
          description: Board name
          minLength: 1
          maxLength: 100
        type:
          type: string
          description: Board type
          enum: [ KANBAN, SCRUM ]

    UpdateBoardRequest:
      type: object
      additionalProperties: false
      properties:
        name:
          type: string
          description: Board name
          minLength: 1
          maxLength: 100

    AddSprintRequest:
      type: object
      additionalProperties: false
      required: [ name, goal ]
      properties:
        name:
          type: string
          description: Sprint name
          minLength: 1
          maxLength: 100
        goal:
          type: string
          description: Sprint goal
          minLength: 1
          maxLength: 200

    UpdateSprintRequest:
      type: object
      additionalProperties: false
      properties:
        name:
          type: string
          description: Sprint name
          minLength: 1
          maxLength: 100
        goal:
          type: string
          description: Sprint goal
          minLength: 1
          maxLength: 200

    SprintResponse:
      type: object
      additionalProperties: false
      required: [ id, name, goal, state, createdAt ]
      properties:
        id:
          type: string
          format: uuid
          description: Sprint identifier
        name:
          type: string
          description: Sprint name
        goal:
          type: string
          description: Sprint goal
        state:
          $ref: '#/components/schemas/SprintState'
        createdAt:
          type: string
          format: date-time
          description: Timestamp when the sprint was created
        startedAt:
          type: string
          format: date-time
          nullable: true
          description: Timestamp when the sprint was started
        finishedAt:
          type: string
          format: date-time
          nullable: true
          description: Timestamp when the sprint was finished

    SprintState:
      type: string
      description: Lifecycle state of a sprint
      enum: [ PLANNED, ACTIVE, CLOSED ]

    UpdateProjectMemberRoleRequest:
      type: object
      additionalProperties: false
      required: [ role ]
      properties:
        role:
          $ref: '#/components/schemas/ProjectMemberRole'

    ProjectResponse:
      type: object
      additionalProperties: false
      required: [ key, name, ownerEmail ]
      properties:
        key:
          type: string
          description: Unique project key
        name:
          type: string
          description: Project name
        ownerEmail:
          type: string
          format: email
          description: Email of the project owner

    UserResponse:
      type: object
      additionalProperties: false
      required: [ id, email, firstName, lastName ]
      properties:
        id:
          type: string
          format: uuid
          description: Unique user ID
        email:
          type: string
          format: email
          description: User email address
        firstName:
          type: string
          description: User first name
        lastName:
          type: string
          description: User last name

    ProjectMemberResponse:
      type: object
      additionalProperties: false
      required: [ id, email, firstName, lastName, role, isOwner ]
      properties:
        id:
          type: string
          format: uuid
          description: Unique user ID
        email:
          type: string
          format: email
          description: User email address
        firstName:
          type: string
          description: User first name
        lastName:
          type: string
          description: User last name
        role:
          $ref: '#/components/schemas/ProjectMemberRole'
        isOwner:
          type: boolean
          description: Whether the user is the owner of the project

    WorkflowStatusResponse:
      type: object
      additionalProperties: false
      required: [ id, name, category ]
      properties:
        id:
          type: string
          format: uuid
          description: Workflow status identifier
        name:
          type: string
          description: Workflow status name
        category:
          type: string
          description: Workflow status category
          enum: [ TODO, IN_PROGRESS, DONE ]

    CreateIssueRequest:
      type: object
      additionalProperties: false
      required: [ title, issueType, priority ]
      properties:
        title:
          type: string
          description: Issue title
          minLength: 1
          maxLength: 200
        description:
          type: string
          description: Issue description
          maxLength: 5000
        issueType:
          type: string
          description: Type of issue
          enum: [ BUG, TASK, STORY ]
        priority:
          type: string
          description: Issue priority
          enum: [ LOW, MEDIUM, HIGH, CRITICAL ]

    UpdateIssueRequest:
      type: object
      additionalProperties: false
      properties:
        title:
          type: string
          description: Issue title
          minLength: 1
          maxLength: 200
        description:
          type: string
          description: Issue description
          maxLength: 5000
        issueType:
          type: string
          description: Type of issue
          enum: [ BUG, TASK, STORY ]
        priority:
          type: string
          description: Issue priority
          enum: [ LOW, MEDIUM, HIGH, CRITICAL ]

    AddAssigneeRequest:
      type: object
      additionalProperties: false
      required: [ userId ]
      properties:
        userId:
          type: string
          format: uuid
          description: User ID to assign

    SetIssueStatusRequest:
      type: object
      additionalProperties: false
      required: [ statusId ]
      properties:
        statusId:
          type: string
          format: uuid
          description: Workflow status ID

    AddCommentRequest:
      type: object
      additionalProperties: false
      required: [ content ]
      properties:
        content:
          type: string
          description: Comment content
          minLength: 1
          maxLength: 5000

    UpdateCommentRequest:
      type: object
      additionalProperties: false
      required: [ content ]
      properties:
        content:
          type: string
          description: Comment content
          minLength: 1
          maxLength: 5000

    IssueDetailsResponse:
      type: object
      additionalProperties: false
      required: [ key, title, issueType, status, priority, assignees, reporter, createdAt, comments ]
      properties:
        key:
          type: string
          description: Unique issue key (e.g., XIRA-1)
        title:
          type: string
          description: Issue title
        description:
          type: string
          description: Issue description
          nullable: true
        issueType:
          type: string
          description: Type of issue
          enum: [ BUG, TASK, STORY ]
        status:
          $ref: '#/components/schemas/WorkflowStatusResponse'
        priority:
          type: string
          description: Issue priority
          enum: [ LOW, MEDIUM, HIGH, CRITICAL ]
        assignees:
          type: array
          description: List of users assigned to this issue
          items:
            $ref: '#/components/schemas/UserResponse'
        sprintName:
          type: string
          description: Name of the sprint this issue is assigned to
          nullable: true
        reporter:
          $ref: '#/components/schemas/UserResponse'
        createdAt:
          type: string
          format: date-time
          description: Timestamp when the issue was created
        closedAt:
          type: string
          format: date-time
          nullable: true
          description: Timestamp when the issue was closed
        comments:
          type: array
          description: List of comments on this issue
          items:
            $ref: '#/components/schemas/CommentResponse'

    CommentResponse:
      type: object
      additionalProperties: false
      required: [ id, author, content, createdAt, updatedAt ]
      properties:
        id:
          type: string
          format: uuid
          description: Comment identifier
        author:
          $ref: '#/components/schemas/UserResponse'
        content:
          type: string
          description: Comment content
        createdAt:
          type: string
          format: date-time
          description: Timestamp when the comment was created
        updatedAt:
          type: string
          format: date-time
          description: Timestamp when the comment was last updated

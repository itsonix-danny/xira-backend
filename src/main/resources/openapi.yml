openapi: 3.0.3
info:
  title: Xira
  version: 1.0.0
  description: 'Xira - Issue tracking and project management'

tags:
  - name: Auth
    description: Authentication endpoints
  - name: Projects
    description: Project management endpoints
  - name: Boards
    description: Board management endpoints

paths:
  /auth/register:
    post:
      tags: [ Auth ]
      operationId: register
      summary: Register a new user account
      description: 'Creates a new user account with the provided credentials. Does not automatically log in the user.'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: User account created successfully
        '400':
          $ref: '#/components/responses/Problem'
        '409':
          $ref: '#/components/responses/Problem'
        '500':
          $ref: '#/components/responses/Problem'

  /auth/login:
    post:
      tags: [ Auth ]
      operationId: login
      summary: Login with username and password
      description: 'Authenticates the user and returns a signed JWT. Use the token in the `Authorization: Bearer <token>` header when calling protected endpoints.'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: JWT issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '400':
          $ref: '#/components/responses/Problem'
        '401':
          $ref: '#/components/responses/Problem'
        '500':
          $ref: '#/components/responses/Problem'

  /projects:
    post:
      tags: [ Projects ]
      operationId: createProject
      summary: Create a new project
      description: 'Creates a new project owned by the authenticated user.'
      security:
        - BearerAuth: [ ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProjectRequest'
      responses:
        '201':
          description: Project created successfully
          headers:
            Location:
              description: URL of the created project resource
              schema:
                type: string
                format: uri
        '400':
          $ref: '#/components/responses/Problem'
        '401':
          $ref: '#/components/responses/Problem'
        '409':
          $ref: '#/components/responses/Problem'
        '500':
          $ref: '#/components/responses/Problem'

  /projects/{key}:
    patch:
      tags: [ Projects ]
      operationId: updateProject
      summary: Update a project
      description: 'Updates project name and/or description. Only accessible by project admins.'
      security:
        - BearerAuth: [ ]
      parameters:
        - name: key
          in: path
          required: true
          description: Project key
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProjectRequest'
      responses:
        '200':
          description: Project updated successfully
        '400':
          $ref: '#/components/responses/Problem'
        '401':
          $ref: '#/components/responses/Problem'
        '403':
          $ref: '#/components/responses/Problem'
        '404':
          $ref: '#/components/responses/Problem'
        '500':
          $ref: '#/components/responses/Problem'

  /projects/{key}/boards:
    post:
      tags: [ Boards ]
      operationId: createBoard
      summary: Add a board to a project
      description: 'Creates a new board for the specified project. Only accessible by project admins.'
      security:
        - BearerAuth: [ ]
      parameters:
        - name: key
          in: path
          required: true
          description: Project key
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddBoardRequest'
      responses:
        '201':
          description: Board created successfully
          headers:
            Location:
              description: URL of the created board resource
              schema:
                type: string
                format: uri
        '400':
          $ref: '#/components/responses/Problem'
        '401':
          $ref: '#/components/responses/Problem'
        '403':
          $ref: '#/components/responses/Problem'
        '404':
          $ref: '#/components/responses/Problem'
        '500':
          $ref: '#/components/responses/Problem'

  /projects/{key}/boards/{boardNumber}:
    patch:
      tags: [ Boards ]
      operationId: updateBoard
      summary: Update a board
      description: 'Updates board name. Only accessible by project admins.'
      security:
        - BearerAuth: [ ]
      parameters:
        - name: key
          in: path
          required: true
          description: Project key
          schema:
            type: string
        - name: boardNumber
          in: path
          required: true
          description: Board number
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateBoardRequest'
      responses:
        '200':
          description: Board updated successfully
        '400':
          $ref: '#/components/responses/Problem'
        '401':
          $ref: '#/components/responses/Problem'
        '403':
          $ref: '#/components/responses/Problem'
        '404':
          $ref: '#/components/responses/Problem'
        '500':
          $ref: '#/components/responses/Problem'

components:
  responses:
    Problem:
      description: Default response in case of an error.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Problem:
      type: object
      additionalProperties: true
      properties:
        type:
          type: string
          format: uri
        title:
          type: string
        status:
          type: integer
          format: int32
        detail:
          type: string
        instance:
          type: string
          format: uri

    RegisterRequest:
      type: object
      additionalProperties: false
      required: [ email, password, firstName, lastName ]
      properties:
        email:
          type: string
          format: email
          description: User email address (must be unique)
        password:
          type: string
          format: password
          minLength: 8
          description: User password (minimum 8 characters)
        firstName:
          type: string
          minLength: 1
          description: User first name
        lastName:
          type: string
          minLength: 1
          description: User last name

    LoginRequest:
      type: object
      additionalProperties: false
      required: [ email, password ]
      properties:
        email:
          type: string
          description: email address
        password:
          type: string
          format: password

    TokenResponse:
      type: object
      additionalProperties: false
      required: [ access_token ]
      properties:
        access_token:
          type: string
          description: 'Signed JWT to send as `Authorization: Bearer <token>`'

    CreateProjectRequest:
      type: object
      additionalProperties: false
      required: [ key, name ]
      properties:
        key:
          type: string
          description: Unique project key (e.g. XIRA)
          minLength: 2
          maxLength: 10
          pattern: '[A-Z]*$'
        name:
          type: string
          description: Human-readable project name
          minLength: 1
          maxLength: 100
        description:
          type: string
          description: Optional project description
          maxLength: 200

    UpdateProjectRequest:
      type: object
      additionalProperties: false
      properties:
        name:
          type: string
          description: Human-readable project name
          minLength: 1
          maxLength: 100
        description:
          type: string
          description: Project description
          minLength: 1
          maxLength: 200

    AddBoardRequest:
      type: object
      additionalProperties: false
      required: [ name, type ]
      properties:
        name:
          type: string
          description: Board name
          minLength: 1
          maxLength: 100
        type:
          type: string
          description: Board type
          enum: [ KANBAN, SCRUM ]

    UpdateBoardRequest:
      type: object
      additionalProperties: false
      properties:
        name:
          type: string
          description: Board name
          minLength: 1
          maxLength: 100

    ProjectResponse:
      type: object
      additionalProperties: false
      required: [ key, name, ownerEmail ]
      properties:
        key:
          type: string
          description: Unique project key
        name:
          type: string
          description: Project name
        ownerEmail:
          type: string
          format: email
          description: Email of the project owner
